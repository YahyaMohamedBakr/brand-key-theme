<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معرض الأعمال | Brand Key</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/shared.css" />
</head>
<body>

  <!-- الهيدر (محمل بالـ JS) -->
  <div id="header-include"></div>

  <!-- المحتوى الخاص بالصفحة — هنا هتتحط السيكشنز -->
  <main class="page-content" id="pageContent">

      <span class="page-placeholder-eyebrow">معرض الأعمال</span>

      <p class="page-placeholder-desc">هنا سيتم إضافة السيكشنات الخاصة بصفحة معرض الأعمال واحدة واحدة.</p>
    </div>

  <!-- الفوتر (محمل بالـ JS) -->
  <div id="footer-include"></div>

  <script src="js/includes.js"></script>
  <script src="js/shared.js"></script>

</html>
