<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <title>سيكولوجية الألوان: كيف تصنع علامتك التجارية؟ | Brand Key</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

</head>
<body>

  <!-- الهيدر (محمل بالـ JS) -->
  <div id="header-include"></div>

  <!-- المحتوى الخاص بالصفحة -->
  <main class="page-content" id="pageContent">

    <!-- ===================== هيرو صفحة المقالة الواحدة (Overlapping Card) ===================== -->
    <section class="article-hero" id="articleHero">

      <!-- فتات الخبز (Breadcrumbs) — خارج حاوية الصورة -->
      <div class="article-hero-breadcrumbs">
        <div class="article-hero-container">
          <nav class="breadcrumbs" aria-label="مسار التنقل">
            <a href="blog.html" class="breadcrumb-link">المدونة</a>
            <span class="breadcrumb-sep">&gt;</span>
            <span class="breadcrumb-current article-breadcrumb-active">سيكولوجية الألوان: كيف تصنع علامتك التجارية؟</span>
          </nav>
        </div>
      </div>

      <!-- البانر الرئيسي + الكارت المتداخل -->
      <div class="article-hero-banner-wrap">
        <!-- صورة الخلفية البانورامية + Overlay -->
        <div class="article-hero-banner" id="articleHeroBanner">
          <div class="article-hero-bg" style="background-image: url('icons/article-hero-bg.png');"></div>
          <div class="article-hero-overlay"></div>
        </div>

        <!-- كارت محتوى المقالة المتداخل (Overlapping Card) -->
        <div class="article-hero-card" id="articleHeroCard">
          <div class="article-hero-container">
            <!-- العنوان الرئيسي (سطرين) -->
            <h1 class="article-hero-title">
              سيكولوجية الألوان:<br />
              كيف تصنع علامتك التجارية؟
            </h1>
            <!-- المقتطف / الوصف الفرعي -->
            <p class="article-hero-desc">
              اكتشف كيف تؤثر الألوان على مشاعر جمهورك وكيف تختار الألوان المناسبة لعلامتك التجارية.
            </p>
          </div>
        </div>
      </div>

      <!-- شريط البيانات الوصفية ومشاركة المقال -->
      <div class="article-hero-meta-bar">
        <div class="article-hero-container">
          <!-- البيانات الوصفية (يمين) -->
          <div class="article-hero-meta">
            <div class="article-hero-meta-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>12 أبريل 2026</span>
            </div>
            <div class="article-hero-meta-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M4 21c0-4 4-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>فريق Brand Key</span>
            </div>
            <div class="article-hero-meta-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>7 دقائق قراءة</span>
            </div>
          </div>

          <!-- أزرار مشاركة المقال (يسار) -->
          <div class="article-hero-share">
            <span class="article-hero-share-label">شارك المقال:</span>
            <button class="article-hero-share-btn article-hero-share-btn--copy" aria-label="نسخ الرابط">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <a href="#" class="article-hero-share-btn article-hero-share-btn--fb" aria-label="مشاركة على فيسبوك">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.69.24 2.69.24v2.97h-1.52c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/>

            <a href="#" class="article-hero-share-btn article-hero-share-btn--tw" aria-label="مشاركة على تويتر">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
              </svg>
            </a>
            <a href="#" class="article-hero-share-btn article-hero-share-btn--in" aria-label="مشاركة على لينكد إن">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 0 1-2.07-2.07c0-1.15.93-2.07 2.07-2.07s2.07.93 2.07 2.07c0 1.15-.93 2.07-2.07 2.07zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

    </section>

    <!-- سيكشن مؤقت للمحتوى القادم -->
    <section class="article-body-placeholder" style="min-height: 40vh;"></section>

  </main>

  <!-- الفوتر (محمل بالـ JS) -->
  <div id="footer-include"></div>

</html>
