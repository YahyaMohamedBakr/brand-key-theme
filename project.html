<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المشروع | Brand Key</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
</head>
<body>

  <!-- الهيدر (محمل بالـ JS) -->
  <div id="header-include"></div>

  <!-- المحتوى الخاص بالصفحة -->
  <main class="page-content" id="pageContent">

    <!-- ===================== هيرو صفحة المشروع ===================== -->
    <section class="project-hero" id="projectHero">

      <!-- فتات الخبز (Breadcrumbs) -->
      <div class="project-hero-breadcrumbs">
        <div class="project-hero-container">
          <nav class="breadcrumbs" aria-label="مسار التنقل">
            <a href="portfolio.html" class="breadcrumb-link">معرض الأعمال</a>
            <span class="breadcrumb-sep">&gt;</span>
            <span class="breadcrumb-current">مؤسسة الصحة: حملة رقمية حققت 2M ريال</span>
          </nav>
        </div>
      </div>

      <!-- البانر الرئيسي -->
      <div class="project-hero-container">
        <div class="project-hero-banner" id="projectHeroBanner">
          <!-- صورة الخلفية + Overlay -->
          <div class="project-hero-bg" style="background-image: url('icons/project-img1.png');"></div>
          <div class="project-hero-overlay"></div>

          <!-- المحتوى -->
          <div class="project-hero-content" id="projectHeroContent">
            <h1 class="project-hero-title">مؤسسة الصحة: حملة رقمية حققت 2M ريال</h1>
            <p class="project-hero-desc">
              في براند كي، لا نروي قصصاً عن "التسويق"، بل نروي قصصاً عن "التغيير". اكتشف كيف ساعدنا شركاءنا في تحويل التحديات إلى تبرعات، والأهداف إلى واقع ملموس.
            </p>

            <!-- شريط الميتا -->
            <div class="project-hero-meta">
              <div class="project-hero-meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2C7.58 2 4 5.58 4 10C4 15.5 12 22 12 22S20 15.5 20 10C20 5.58 16.42 2 12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>الدمام</span>
              </div>
              <div class="project-hero-meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>المدة: 45 يوماً</span>
              </div>
              <div class="project-hero-meta-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M7 17L17 7M17 7H10M17 7V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M3 21H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>النمو والوصول</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </section>

  </main>

  <!-- الفوتر (محمل بالـ JS) -->
  <div id="footer-include"></div>

  <script src="js/includes.js"></script>
  <script src="js/shared.js"></script>
</body>
</html>
