<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تدريب الشركات | Brand Key</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
</head>
<body>

  <!-- الهيدر (محمل بالـ JS) -->
  <div id="header-include"></div>

  <!-- الهيرو الداخلي (محمل بالـ JS — بيدعم data-* attributes) -->
  <div id="inner-hero-include"
       data-title="فريقك التسويقي هو أصولك — نبنيه أو نطوّره"
       data-desc="برامج تدريبية مخصصة للفرق التسويقية في الشركات — من تأسيس الفريق وتحديد الأدوار، إلى رفع الكفاءة وتطوير الأداء بمنهجية عملية."
       data-primary-text="اطلب برنامجك التدريبي"
       data-primary-icon="icons/start-icon.svg"
       data-primary-href="contact.html"
       data-ghost-text="تعرّف على البرامج"
       data-ghost-icon="icons/humbleicons-arrow-up.svg"
       data-ghost-href="#">
  </div>

  <!-- المحتوى الخاص بالصفحة — هنا هتتحط السيكشنز -->
  <main class="page-content" id="pageContent">
    <div class="page-placeholder">
      <span class="page-placeholder-eyebrow">تدريب الشركات</span>
      <h2 class="page-placeholder-title">المحتوى قيد الإضافة</h2>
      <p class="page-placeholder-desc">هنا سيتم إضافة السيكشنات الخاصة بصفحة تدريب الشركات واحدة واحدة.</p>
    </div>
  </main>

  <!-- الفوتر (محمل بالـ JS) -->
  <div id="footer-include"></div>

  <script src="js/includes.js"></script>
  <script src="js/shared.js"></script>
</body>
</html>
